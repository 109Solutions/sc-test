const LOCS={"L": "Lobby", "GYM": "Active Living Room", "GR": "Game Room", "TH": "Theatre", "BP": "Bistro & Pub", "CK": "Community Kitchen", "AS": "Art Studio", "DR": "Dining Room", "P": "Patio", "AL": "Assisted Living Room", "MC": "Memory Care", "GH": "Green House"};
const STORAGE_KEY='sc_schedule_'+WING;

function expandLoc(l){return LOCS[l]||l||'';}
function parseMins(t){
  const m=t.match(/(\d{1,2}):(\d{2})/);if(!m)return -1;
  let h=parseInt(m[1]),min=parseInt(m[2]);if(h<8)h+=12;return h*60+min;
}
function fmtTime(t){
  const m=t.match(/(\d{1,2}):(\d{2})/);if(!m)return t;
  let h=parseInt(m[1]),min=m[2];if(h<8)h+=12;
  return (h%12||12)+':'+min+' '+(h>=12?'PM':'AM');
}

const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
const now=new Date();
document.getElementById('dl').textContent=days[now.getDay()]+', '+months[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();

let activities=[];

function init(){
  const month=now.getMonth()+1,day=now.getDate();
  const base=(month===5&&CALENDAR[day])?CALENDAR[day]:[];
  activities=base.map(ev=>(({time:ev[0],name:ev[1],loc:expandLoc(ev[2]||''),cancelled:false})));
  activities.sort((a,b)=>parseMins(a.time)-parseMins(b.time));
}

function render(){
  const list=document.getElementById('alist');
  if(!activities.length){list.innerHTML='<p style="color:#bbb;text-align:center;padding:20px">No activities for today.</p>';return;}
  list.innerHTML=activities.map((ev,i)=>`
    <div class="ac${ev.cancelled?' cancelled':''}" onclick="tog(${i})">
      <div class="cb">${ev.cancelled?'✕':'✓'}</div>
      <div class="ai">
        <div class="at">${fmtTime(ev.time)}</div>
        <div class="an">${ev.name}</div>
        ${ev.loc?`<div class="al">📍 ${ev.loc}</div>`:''}
        ${ev.cancelled?'<div class="cx">Cancelled</div>':''}
      </div>
    </div>`).join('');
}

function tog(i){activities[i].cancelled=!activities[i].cancelled;render();}

function addAct(){
  const t=document.getElementById('nt').value;
  const n=document.getElementById('nn').value.trim();
  const l=document.getElementById('nl').value.trim();
  if(!t||!n){alert('Please enter a time and name.');return;}
  const h=parseInt(t.split(':')[0]),m=t.split(':')[1];
  activities.push({time:(h%12||12)+':'+m+' '+(h>=12?'PM':'AM'),name:n,loc:l,cancelled:false});
  activities.sort((a,b)=>parseMins(a.time)-parseMins(b.time));
  document.getElementById('nt').value='';document.getElementById('nn').value='';document.getElementById('nl').value='';
  render();
}

function save(){
  // Save to localStorage — display page will pick it up instantly
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    date: now.toDateString(),
    activities: activities
  }));
  const ok=document.getElementById('ok');
  ok.style.display='block';
  setTimeout(()=>ok.style.display='none',4000);
}

function reset(){
  if(!confirm('Reset to the original PDF schedule?'))return;
  localStorage.removeItem(STORAGE_KEY);
  init();render();
}

// Load any existing saved data
try{
  const saved=localStorage.getItem(STORAGE_KEY);
  if(saved){
    const data=JSON.parse(saved);
    if(data.date===now.toDateString()&&data.activities){
      activities=data.activities;
      render();
    }else{init();render();}
  }else{init();render();}
}catch(e){init();render();}
