<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sharon Corners Memory Care - Schedule Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,system-ui,sans-serif;background:#f4f6f9;min-height:100vh;padding:20px}
.container{max-width:680px;margin:0 auto}
.header{background:#fff;border-radius:16px;padding:20px 24px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.header h1{font-size:20px;font-weight:700;color:#1a1a1a}
.badge{display:inline-block;background:#eef0ff;color:#6366f1;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:6px}
.dl{font-size:14px;color:#888;margin-top:4px}
.info{background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:12px 16px;font-size:13px;color:#92400e;margin-bottom:14px;}
.st{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#999;margin:16px 0 8px;padding:0 4px}
.ac{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1.5px solid #eee;cursor:pointer;user-select:none;transition:all .15s}
.ac:active{transform:scale(.98)}
.ac.cancelled{background:#fff5f5;border-color:#fca5a5}
.ac.cancelled .an{text-decoration:line-through;color:#aaa}
.cb{width:32px;height:32px;border-radius:50%;border:2px solid #e0e0e0;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:all .15s}
.ac.cancelled .cb{background:#ef4444;border-color:#ef4444;color:#fff}
.ai{flex:1;min-width:0}
.at{font-size:11px;font-weight:600;color:#999;text-transform:uppercase}
.an{font-size:16px;font-weight:600;color:#1a1a1a;margin-top:2px}
.al{font-size:12px;color:#bbb;margin-top:2px}
.cx{font-size:11px;font-weight:700;color:#ef4444;text-transform:uppercase;margin-top:3px}
.ab{background:#fff;border-radius:12px;padding:18px;margin-top:6px;border:1.5px dashed #ddd}
.ab h3{font-size:14px;font-weight:600;color:#666;margin-bottom:12px}
.ar{display:flex;gap:8px;margin-bottom:10px}
input{border:1.5px solid #e0e0e0;border-radius:8px;padding:10px 14px;font-size:15px;font-family:inherit;outline:none;width:100%}
input:focus{border-color:#6366f1}
.addbtn{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
.savebtn{width:100%;margin-top:20px;padding:16px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer}
.savebtn:disabled{background:#999;cursor:not-allowed}
.ok{display:none;background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:14px;color:#166534;font-size:15px;font-weight:500;text-align:center;margin-top:12px}
.resetbtn{width:100%;margin-top:10px;padding:12px;background:#fff;color:#999;border:1.5px solid #e0e0e0;border-radius:12px;font-size:14px;cursor:pointer}
</style></head><body>

  <div class="header">
    <h1>📋 Schedule Manager</h1>
    <div class="badge">Memory Care</div>
    <div class="dl" id="dl"></div>
  </div>
  <div class="info">💡 Open the display page in another tab on the same browser — it will update automatically when you save.</div>
  <div class="st">Today's activities — tap to cancel / uncancel</div>
  <div id="alist"></div>
  <div class="st">Add a new activity</div>
  <div class="ab">
    <h3>Add a new activity</h3>
    <div class="ar"><input type="time" id="nt" style="width:130px;flex-shrink:0"><input type="text" id="nn" placeholder="Activity name"></div>
    <div class="ar"><input type="text" id="nl" placeholder="Location (optional)"><button class="addbtn" onclick="addAct()">+ Add</button></div>
  </div>
  <button class="savebtn" id="savebtn" onclick="save()">✅ Update Display</button>
  <div class="ok" id="ok">✅ Display updated! The screen will refresh within 10 seconds.</div>
  <button class="resetbtn" onclick="reset()">↺ Reset to original PDF schedule</button>
</div>

0", "Fun and Focus", "Memory Care"], ["6:00", "Tongue Twister", "Memory Care"]]};
const LOCS={"L": "Lobby", "GYM": "Active Living Room", "GR": "Game Room", "TH": "Theatre", "BP": "Bistro & Pub", "CK": "Community Kitchen", "AS": "Art Studio", "DR": "Dining Room", "P": "Patio", "AL": "Assisted Living Room", "MC": "Memory Care", "GH": "Green House"};
const STORAGE_KEY='sc_schedule_'+WING;

function expandLoc(l){return LOCS[l]||l||'';}
function parseMins(t){
  const m=t.match(/(\d{1,2}):(\d{2})/);if(!m)return -1;
  let h=parseInt(m[1]),min=parseInt(m[2]);if(h<8)h+=12;return h*60+min;
}
function fmtTime(t){
  const m=t.match(/(\d{1,2}):(\d{2})/);if(!m)return t;
  let h=parseInt(m[1]),min=m[2];if(h<8)h+=12;
  return (h%12||12)+':'+min+' '+(h>=12?'PM':'AM');
}

const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
const now=new Date();
const SUPABASE_URL='https://ueeobotxeyanprdsodng.supabase.co';
const SUPABASE_KEY='https://ueoebotxeyanprdsodng.supabase.co/rest/v1/';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const TABLE='schedule_overrides';

document.getElementById('dl').textContent=days[now.getDay()]+', '+months[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();

let activities=[];

function todayISO(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function rowId(){ return WING+'_'+todayISO(); }

function init(){
  const month=now.getMonth()+1,day=now.getDate();
  const base=(month===5&&CALENDAR[day])?CALENDAR[day]:[];
  activities=base.map(ev=>({time:ev[0],name:ev[1],loc:expandLoc(ev[2]||''),cancelled:false}));
  activities.sort((a,b)=>parseMins(a.time)-parseMins(b.time));
}

function render(){
  const list=document.getElementById('alist');
  if(!activities.length){list.innerHTML='<p style="color:#bbb;text-align:center;padding:20px">No activities for today.</p>';return;}
  list.innerHTML=activities.map((ev,i)=>`
    <div class="ac${ev.cancelled?' cancelled':''}" onclick="tog(${i})">
      <div class="cb">${ev.cancelled?'✕':'✓'}</div>
      <div class="ai">
        <div class="at">${fmtTime(ev.time)}</div>
        <div class="an">${ev.name}</div>
        ${ev.loc?`<div class="al">📍 ${ev.loc}</div>`:''}
        ${ev.cancelled?'<div class="cx">Cancelled</div>':''}
      </div>
    </div>`).join('');
}

function tog(i){activities[i].cancelled=!activities[i].cancelled;render();}

function addAct(){
  const t=document.getElementById('nt').value;
  const n=document.getElementById('nn').value.trim();
  const l=document.getElementById('nl').value.trim();
  if(!t||!n){alert('Please enter a time and name.');return;}
  const h=parseInt(t.split(':')[0]),m=t.split(':')[1];
  activities.push({time:(h%12||12)+':'+m+' '+(h>=12?'PM':'AM'),name:n,loc:l,cancelled:false});
  activities.sort((a,b)=>parseMins(a.time)-parseMins(b.time));
  document.getElementById('nt').value='';document.getElementById('nn').value='';document.getElementById('nl').value='';
  render();
}

async function loadFromSupabase(){
  init();
  try{
    const { data, error } = await db.from(TABLE).select('activities').eq('id', rowId()).maybeSingle();
    if(error) throw error;
    if(data && Array.isArray(data.activities)) activities=data.activities;
  }catch(e){
    console.warn('Supabase load failed, using local fallback:', e.message);
    try{
      const saved=localStorage.getItem(STORAGE_KEY);
      if(saved){
        const data=JSON.parse(saved);
        if(data.date===now.toDateString()&&data.activities) activities=data.activities;
      }
    }catch(_e){}
  }
  render();
}

async function save(){
  try{
    const payload={ id:rowId(), wing:WING, schedule_date:todayISO(), activities:activities, updated_at:new Date().toISOString() };
    const { error } = await db.from(TABLE).upsert(payload);
    if(error) throw error;
    localStorage.setItem(STORAGE_KEY, JSON.stringify({date:now.toDateString(),activities}));
    const ok=document.getElementById('ok');
    ok.textContent='Saved live. Display screens will update automatically.';
    ok.style.display='block';
    setTimeout(()=>ok.style.display='none',4000);
  }catch(e){
    alert('Could not save to Supabase: '+e.message+'\nCheck your publishable key, table, and RLS policies.');
  }
}

async function reset(){
  if(!confirm('Reset to the original PDF schedule?'))return;
  try{ await db.from(TABLE).delete().eq('id', rowId()); }catch(e){ console.warn(e); }
  localStorage.removeItem(STORAGE_KEY);
  init();render();
}

function startRealtime(){
  db.channel('schedule_'+WING)
    .on('postgres_changes', {event:'*', schema:'public', table:TABLE, filter:'wing=eq.'+WING}, payload=>{
      if(!payload.new || payload.new.id===rowId() || (payload.old && payload.old.id===rowId())) loadFromSupabase();
    })
    .subscribe();
}

loadFromSupabase();
startRealtime();
</script></body></html>
