<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080">
<title>Sharon Corners Memory Care</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1920px;height:1080px;overflow:hidden;background:#f0f0f0;font-family:Segoe UI,system-ui,sans-serif}
.screen{width:1920px;height:1080px;display:grid;grid-template-rows:150px 1fr 70px}

header{display:flex;justify-content:space-between;align-items:center;padding:0 60px;background:#fff;border-bottom:2px solid #e8e8e8;gap:32px}
.logo img{height:82px;width:auto}
.htitle{flex:1;text-align:center}
.htitle h2{font-size:26px;font-weight:700;color:#1a1a1a}
.htitle p{font-size:15px;color:#999;margin-top:4px}
.ww{display:flex;align-items:center;gap:16px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:14px;padding:12px 22px;flex-shrink:0}
.wi{font-size:40px}.wt{font-size:30px;font-weight:300;color:#1a1a1a;line-height:1}.wc{font-size:13px;color:#666}.wl{font-size:12px;color:#999}
.wf{display:flex;gap:14px;padding-left:16px;border-left:1px solid #ddd}
.fc{display:flex;flex-direction:column;align-items:center;gap:3px}.fcn{font-size:11px;color:#999;text-transform:uppercase}.fci{font-size:18px}.fch{font-size:13px;color:#555;font-weight:500}
.hr{text-align:right;flex-shrink:0}
.clock{font-size:56px;font-weight:200;color:#1a1a1a;letter-spacing:-2px;line-height:1}
.dd{font-size:15px;color:#888;margin-top:5px}

.main{padding:20px 50px;overflow:hidden;display:flex;flex-direction:column;background:#f0f0f0}
.sbar{font-size:14px;color:#999;margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sdot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
.egrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;flex:1;align-content:start;overflow:hidden}
.ec{background:#fff;border:1px solid #e0e0e0;border-radius:18px;padding:26px 30px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.ec.now{background:#eef0ff;border-color:#a5b4fc;box-shadow:0 4px 16px rgba(99,102,241,.15)}
.ec.past{opacity:.32}
.ec::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;border-radius:18px 0 0 18px;background:#d1d5db}
.ec.now::before{background:#6366f1}
.nb{font-size:13px;font-weight:700;background:#6366f1;color:#fff;padding:4px 14px;border-radius:20px;text-transform:uppercase;align-self:flex-start;letter-spacing:.5px}
.et{font-size:16px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.8px}
.ec.now .et{color:#6366f1}
.en{font-size:26px;font-weight:700;color:#1a1a1a;line-height:1.25}
.el{font-size:15px;padding:5px 14px;border-radius:20px;background:#f3f4f6;color:#666;font-weight:500;align-self:flex-start;margin-top:4px}
.sl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#bbb;grid-column:1/-1;padding-top:4px}
.cm{font-size:30px;font-weight:300;color:#bbb;text-align:center;margin-top:120px;line-height:2}

footer{display:flex;justify-content:space-between;align-items:center;padding:0 60px;background:#fff;border-top:2px solid #e8e8e8}
.fl{font-size:13px;color:#bbb}
.fr{display:flex;align-items:center;gap:10px}
.fr span{font-size:13px;color:#bbb}
.al-logo img{height:52px;width:auto}
</style></head><body>

const LOCS={"L": "Lobby", "GYM": "Active Living Room", "GR": "Game Room", "TH": "Theatre", "BP": "Bistro & Pub", "CK": "Community Kitchen", "AS": "Art Studio", "DR": "Dining Room", "P": "Patio", "AL": "Assisted Living Room", "MC": "Memory Care", "GH": "Green House"};
const STORAGE_KEY='sc_schedule_'+WING;

function expandLoc(l){return LOCS[l]||l||'';}
function parseMins(t){
  const m=t.match(/(\d{1,2}):(\d{2})/);if(!m)return -1;
  let h=parseInt(m[1]),min=parseInt(m[2]);if(h<8)h+=12;return h*60+min;
}
function fmtTime(t){
  const m=t.match(/(\d{1,2}):(\d{2})/);if(!m)return t;
  let h=parseInt(m[1]),min=m[2];if(h<8)h+=12;
  return (h%12||12)+':'+min+' '+(h>=12?'PM':'AM');
}

async function fetchWeather(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=44.0834&longitude=-79.4667&current=temperature_2m,weathercode&daily=weathercode,temperature_2m_max&timezone=America%2FToronto&forecast_days=4');
    const d=await r.json();
    const icons={'0':'☀️','1':'⛅','2':'⛅','3':'☁️','45':'🌫️','48':'🌫️','51':'🌦️','53':'🌦️','55':'🌧️','61':'🌧️','63':'🌧️','65':'🌧️','71':'❄️','73':'❄️','75':'❄️','80':'🌦️','81':'🌦️','82':'🌦️','95':'⛈️','96':'⛈️','99':'⛈️'};
    const texts={'0':'Clear Sky','1':'Partly Cloudy','2':'Partly Cloudy','3':'Overcast','45':'Foggy','48':'Foggy','51':'Drizzle','53':'Drizzle','55':'Rain','61':'Rain','63':'Rain','65':'Heavy Rain','71':'Snow','73':'Snow','75':'Heavy Snow','80':'Showers','81':'Showers','82':'Heavy Showers','95':'Thunderstorm','96':'Thunderstorm','99':'Thunderstorm'};
    const c=String(d.current.weathercode);
    document.getElementById('wi').textContent=icons[c]||'🌡️';
    document.getElementById('wt').textContent=Math.round(d.current.temperature_2m)+'°C';
    document.getElementById('wc').textContent=texts[c]||'Unknown';
    const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];let h='';
    d.daily.date.slice(1,4).forEach((ds,i)=>{
      const day=days[new Date(ds+'T12:00:00').getDay()];
      const dc=String(d.daily.weathercode[i+1]);
      h+=`<div class="fc"><div class="fcn">${day}</div><div class="fci">${icons[dc]||'🌡️'}</div><div class="fch">${Math.round(d.daily.temperature_2m_max[i+1])}°C</div></div>`;
    });
    document.getElementById('wf').innerHTML=h;
  }catch(e){}
}

function updateClock(){
  const n=new Date(),h=n.getHours(),m=n.getMinutes();
  const ap=h>=12?'PM':'AM',hh=h%12||12;
  document.getElementById('clock').textContent=hh+':'+(m+'').padStart(2,'0')+' '+ap;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dd').textContent=days[n.getDay()]+', '+months[n.getMonth()]+' '+n.getDate()+', '+n.getFullYear();
}

function renderEvents(events){
  const main=document.getElementById('main');
  if(!events||!events.length){
    main.innerHTML='<div class="cm">No activities scheduled for today.</div>';
    return;
  }
  const now=new Date(),nm=now.getHours()*60+now.getMinutes();
  const sorted=[...events].sort((a,b)=>parseMins(a[0])-parseMins(b[0]));
  const ts=now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('fl').textContent='Sharon Corners · Memory Care · May 2026';
  let html=`<div class="sbar"><div class="sdot"></div><span>Last updated · ${ts}</span></div><div class="egrid">`;
  let up=false;
  sorted.forEach(ev=>{
    const [t,n,l]=ev,s=parseMins(t),e=s+60;
    const past=e>0&&e<nm,curr=s<=nm&&e>=nm,upcoming=s>nm;
    if(upcoming&&!up){html+='<div class="sl" style="grid-column:1/-1;">Upcoming</div>';up=true;}
    const loc=expandLoc(l);
    html+=`<div class="ec ${curr?'now':''} ${past?'past':''}">
      ${curr?'<div class="nb">Now</div>':''}
      <div class="et">${fmtTime(t)}</div>
      <div class="en">${n}</div>
      ${loc?`<div class="el">📍 ${loc}</div>`:''}
    </div>`;
  });
  main.innerHTML=html+'</div>';
}

function loadToday(){
  const now=new Date(),month=now.getMonth()+1,day=now.getDate();
  // Check localStorage for staff overrides
  try{
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved){
      const data=JSON.parse(saved);
      if(data.date===now.toDateString()&&data.activities){
        renderEvents(data.activities.filter(ev=>!ev.cancelled).map(ev=>[ev.time,ev.name,ev.loc||'']));
        return;
      }
    }
  }catch(e){}
  // Fall back to PDF calendar
  if(month===5&&CALENDAR[day]){renderEvents(CALENDAR[day]);}
  else{document.getElementById('main').innerHTML='<div class="cm">No calendar data for today.</div>';}
}

let nc=Date.now()+10000;
setInterval(()=>{
  const s=Math.max(0,Math.round((nc-Date.now())/1000));
  document.getElementById('fr').textContent='Updates in '+Math.floor(s/60)+':'+(s%60+'').padStart(2,'0');
},1000);

// Check for updates every 10 seconds
function checkAndUpdate(){
  loadToday();
  nc=Date.now()+10000;
}

updateClock();
setInterval(updateClock,10000);
loadToday();
setInterval(checkAndUpdate,10000);
fetchWeather();
setInterval(fetchWeather,30*60*1000);

// Listen for storage changes from admin page in same browser
window.addEventListener('storage',e=>{
  if(e.key===STORAGE_KEY)loadToday();
});
